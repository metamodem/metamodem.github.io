<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Колесо судьбы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Russo+One&display=swap');

  :root {
    --black: #0A0A0A;
    --white: #F5F0E8;
    --red: #D62B2B;
    --yellow: #F2C12E;
    --blue: #1B3A8C;
    --orange: #E8621A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px 16px 32px;
    overflow-x: hidden;
    position: relative;
  }

  /* Suprematist background shapes */
  .bg-shapes {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-shapes::before {
    content: '';
    position: absolute;
    top: -60px; right: -40px;
    width: 180px; height: 180px;
    background: var(--red);
    opacity: 0.15;
    transform: rotate(22deg);
  }

  .bg-shapes::after {
    content: '';
    position: absolute;
    bottom: 80px; left: -50px;
    width: 140px; height: 60px;
    background: var(--blue);
    opacity: 0.2;
    transform: rotate(-15deg);
  }

  .bg-circle {
    position: absolute;
    bottom: -80px; right: 20px;
    width: 200px; height: 200px;
    border: 3px solid var(--yellow);
    border-radius: 50%;
    opacity: 0.08;
  }

  .bg-line {
    position: absolute;
    top: 40%; left: 0;
    width: 100%; height: 2px;
    background: var(--white);
    opacity: 0.04;
    transform: rotate(-8deg);
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  .header {
    width: 100%;
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 24px;
  }

  .header-square {
    width: 14px;
    height: 40px;
    background: var(--red);
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Russo One', sans-serif;
    font-size: 22px;
    line-height: 1;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--white);
  }

  .header-title span {
    display: block;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--yellow);
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
    margin-top: 4px;
  }

  /* Wheel container */
  .wheel-wrap {
    position: relative;
    width: 100%;
    max-width: 340px;
    aspect-ratio: 1;
    margin-bottom: 24px;
  }

  /* Pointer */
  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 28px solid var(--red);
    filter: drop-shadow(0 2px 4px rgba(214,43,43,0.6));
  }

  .pointer::after {
    content: '';
    position: absolute;
    top: -28px;
    left: -6px;
    width: 12px;
    height: 12px;
    background: var(--yellow);
    border-radius: 50%;
  }

  /* Canvas wheel */
  #wheelCanvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    cursor: pointer;
    display: block;
    transition: transform 0.1s;
  }

  #wheelCanvas:active {
    transform: scale(0.98);
  }

  /* Spin button */
  .spin-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px;
    height: 64px;
    background: var(--black);
    border: 3px solid var(--white);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    transition: all 0.15s;
  }

  .spin-btn:hover { background: #1a1a1a; }
  .spin-btn:active { transform: translate(-50%, -50%) scale(0.95); }

  .spin-btn-inner {
    width: 44px;
    height: 44px;
    background: var(--red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .spin-icon {
    width: 0; height: 0;
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    border-left: 14px solid var(--white);
    margin-left: 2px;
  }

  /* Result panel */
  .result-panel {
    width: 100%;
    max-width: 340px;
    min-height: 80px;
    background: transparent;
    border-left: 4px solid var(--red);
    padding: 16px 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: opacity 0.3s;
  }

  .result-panel::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 40px; height: 40px;
    background: var(--yellow);
    opacity: 0.12;
  }

  .result-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 8px;
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
  }

  .result-text {
    font-family: 'Russo One', sans-serif;
    font-size: 20px;
    line-height: 1.2;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    min-height: 48px;
    display: flex;
    align-items: center;
    opacity: 0;
    transform: translateX(-10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .result-text.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .result-text.idle {
    opacity: 0.3;
    font-size: 14px;
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
    letter-spacing: 0.15em;
    transform: none;
  }

  /* Decorative row */
  .deco-row {
    width: 100%;
    max-width: 340px;
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    align-items: center;
  }

  .deco-rect {
    height: 6px;
    flex: 1;
    background: var(--white);
    opacity: 0.08;
  }

  .deco-rect:nth-child(2) { background: var(--red); opacity: 0.6; flex: 0.4; }
  .deco-rect:nth-child(4) { background: var(--yellow); opacity: 0.5; flex: 0.3; }

  /* Items list */
  .items-section {
    width: 100%;
    max-width: 340px;
  }

  .items-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0.35;
    margin-bottom: 10px;
  }

  .items-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }

  .item-chip {
    background: transparent;
    border: 1px solid rgba(245,240,232,0.12);
    padding: 6px 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: rgba(245,240,232,0.5);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: default;
    transition: all 0.2s;
    line-height: 1.3;
  }

  .item-chip.active {
    background: var(--red);
    border-color: var(--red);
    color: var(--white);
    opacity: 1;
  }

  /* Spinning animation */
  @keyframes spin-flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .spinning .spin-btn-inner {
    animation: spin-flash 0.5s ease infinite;
  }
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="bg-circle"></div>
  <div class="bg-line"></div>
</div>

<div class="page">
  <div class="header">
    <div class="header-square"></div>
    <div class="header-title">
      Колесо судьбы
      <span>Крути и подчиняйся</span>
    </div>
  </div>

  <div class="wheel-wrap" id="wheelWrap">
    <div class="pointer"></div>
    <canvas id="wheelCanvas"></canvas>
    <div class="spin-btn" id="spinBtn" onclick="spinWheel()">
      <div class="spin-btn-inner">
        <div class="spin-icon"></div>
      </div>
    </div>
  </div>

  <div class="result-panel">
    <div class="result-label">Твоя задача</div>
    <div class="result-text idle" id="resultText">КРУТИ КОЛЕСО</div>
  </div>

  <div class="deco-row">
    <div class="deco-rect"></div>
    <div class="deco-rect"></div>
    <div class="deco-rect"></div>
    <div class="deco-rect"></div>
    <div class="deco-rect"></div>
  </div>

  <div class="items-section">
    <div class="items-label">варианты судьбы</div>
    <div class="items-grid" id="itemsGrid"></div>
  </div>
</div>

<script>
const ITEMS = [
  "Бухнуть",
  "Едь домой",
  "Выпей кофе",
  "Съешь тортик",
  "Позови кого-нибудь встретиться",
  "Ляг спать",
  "Работай давай",
  "Купи ненужную штуку на Озоне",
  "Не бухнуть, если думал бухнуть",
  "Уборка",
  "Погуляй бесцельно"
];

// Suprematist color palette — alternating bold blocks
const COLORS = [
  '#D62B2B', // red
  '#1B3A8C', // blue
  '#F2C12E', // yellow
  '#0A0A0A', // black (with white text)
  '#E8621A', // orange
  '#4A1B8C', // dark violet
  '#D62B2B',
  '#1B3A8C',
  '#F2C12E',
  '#E8621A',
  '#4A1B8C',
];

const TEXT_COLORS = [
  '#F5F0E8',
  '#F5F0E8',
  '#0A0A0A',
  '#F5F0E8',
  '#F5F0E8',
  '#F5F0E8',
  '#F5F0E8',
  '#F5F0E8',
  '#0A0A0A',
  '#F5F0E8',
  '#F5F0E8',
];

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wheelWrap');

let currentAngle = 0;
let isSpinning = false;
let activeIndex = -1;

function resize() {
  const size = wrap.offsetWidth;
  canvas.width = size * window.devicePixelRatio;
  canvas.height = size * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  drawWheel(currentAngle);
}

function drawWheel(angle) {
  const size = wrap.offsetWidth;
  const cx = size / 2, cy = size / 2;
  const r = size / 2 - 4;
  const n = ITEMS.length;
  const arc = (2 * Math.PI) / n;

  ctx.clearRect(0, 0, size, size);

  // Outer ring - suprematist border
  ctx.beginPath();
  ctx.arc(cx, cy, r + 3, 0, 2 * Math.PI);
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#F5F0E8';
  ctx.stroke();

  // Segments
  for (let i = 0; i < n; i++) {
    const start = angle + i * arc - Math.PI / 2;
    const end = start + arc;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();

    // Segment border
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.strokeStyle = '#0A0A0A';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = TEXT_COLORS[i % TEXT_COLORS.length];
    ctx.font = `bold ${size < 300 ? 9 : 10}px 'Oswald', sans-serif`;
    
    const label = ITEMS[i].toUpperCase();
    const maxLen = 18;
    let line1 = label, line2 = '';
    if (label.length > maxLen) {
      const mid = label.lastIndexOf(' ', maxLen);
      if (mid > 0) {
        line1 = label.slice(0, mid);
        line2 = label.slice(mid + 1);
      }
    }
    const textR = r * 0.88;
    if (line2) {
      ctx.fillText(line1, textR, -6);
      ctx.fillText(line2, textR, 6);
    } else {
      ctx.fillText(line1, textR, 4);
    }

    // Small geometric accent per segment
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(r * 0.25, -1.5, 20, 3);

    ctx.restore();
  }

  // Center circle decoration
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 34);
  grad.addColorStop(0, '#1a1a1a');
  grad.addColorStop(1, '#0A0A0A');
  ctx.beginPath();
  ctx.arc(cx, cy, 34, 0, 2 * Math.PI);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#F5F0E8';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Small red square in center
  ctx.fillStyle = '#D62B2B';
  ctx.fillRect(cx - 5, cy - 5, 10, 10);
}

function getWinner(angle) {
  const n = ITEMS.length;
  const arc = 360 / n;
  // Pointer is at top (270° in standard coords), segments start at -90
  let deg = ((-angle * 180 / Math.PI) % 360 + 360) % 360;
  // Which segment is at the top
  const idx = Math.floor(deg / arc) % n;
  return idx;
}

function spinWheel() {
  if (isSpinning) return;
  isSpinning = true;

  const wrap = document.getElementById('wheelWrap');
  wrap.classList.add('spinning');

  const resultText = document.getElementById('resultText');
  resultText.classList.remove('visible', 'idle');
  resultText.textContent = '...';

  // Haptic if available
  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback) {
    Telegram.WebApp.HapticFeedback.impactOccurred('medium');
  }

  const extraSpins = 5 + Math.floor(Math.random() * 5);
  const extraAngle = Math.random() * 2 * Math.PI;
  const totalAngle = extraSpins * 2 * Math.PI + extraAngle;
  const duration = 3500 + Math.random() * 1000;
  const startAngle = currentAngle;
  const targetAngle = startAngle + totalAngle;
  let startTime = null;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animate(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = easeOut(progress);

    currentAngle = startAngle + totalAngle * eased;
    drawWheel(currentAngle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      isSpinning = false;
      wrap.classList.remove('spinning');

      const winner = getWinner(currentAngle);
      activeIndex = winner;
      updateChips();

      resultText.textContent = ITEMS[winner].toUpperCase();
      resultText.classList.remove('idle');
      setTimeout(() => resultText.classList.add('visible'), 20);

      if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback) {
        Telegram.WebApp.HapticFeedback.notificationOccurred('success');
      }
    }
  }

  requestAnimationFrame(animate);
}

// Build chips
function buildChips() {
  const grid = document.getElementById('itemsGrid');
  grid.innerHTML = '';
  ITEMS.forEach((item, i) => {
    const chip = document.createElement('div');
    chip.className = 'item-chip';
    chip.id = 'chip-' + i;
    chip.textContent = item;
    grid.appendChild(chip);
  });
}

function updateChips() {
  ITEMS.forEach((_, i) => {
    const chip = document.getElementById('chip-' + i);
    if (chip) {
      chip.classList.toggle('active', i === activeIndex);
    }
  });
}

// Canvas click
canvas.addEventListener('click', spinWheel);

// Init
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

buildChips();
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
