<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Goddess Food Drop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  body {
    background: #87CEEB; overflow: hidden;
    font-family: 'Georgia', serif; user-select: none;
    height: 100vh; width: 100vw;
  }
  #gameCanvas { display: block; margin: 0 auto; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 10px 14px; pointer-events: none; z-index: 10;
  }
  .ui-box {
    background: rgba(255,220,130,0.93); border: 3px solid #c47b1a;
    border-radius: 16px; padding: 5px 13px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.22);
  }
  .score-label { font-size: 10px; color: #8B4513; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  .score-value { font-size: 22px; color: #5D1E00; font-weight: bold; line-height: 1.1; }
  .lives-display { font-size: 18px; letter-spacing: 2px; line-height: 1.5; }
  #overlay {
    position: fixed; inset: 0; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.52); z-index: 20; backdrop-filter: blur(5px);
  }
  .overlay-card {
    background: linear-gradient(145deg, #FFF5CE, #FFE590);
    border: 4px solid #c47b1a; border-radius: 28px;
    padding: 28px 36px; text-align: center;
    box-shadow: 0 14px 40px rgba(0,0,0,0.32);
    max-width: 310px; width: 90%;
  }
  .overlay-title { font-size: 28px; color: #5D1E00; font-weight: bold; margin-bottom: 8px; }
  .overlay-sub { font-size: 14px; color: #8B4513; margin-bottom: 16px; line-height: 1.6; }
  .overlay-score { font-size: 42px; color: #C0392B; font-weight: bold; margin-bottom: 18px; }
  .food-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 7px; margin-bottom: 18px; }
  .food-item { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #5D1E00; background: rgba(255,255,255,0.55); border-radius: 20px; padding: 3px 10px; }
  .food-emoji { font-size: 15px; }
  .btn {
    background: linear-gradient(145deg, #FF7043, #E53935); color: white;
    border: none; border-radius: 50px; padding: 13px 34px; font-size: 18px;
    font-weight: bold; cursor: pointer; pointer-events: all;
    box-shadow: 0 5px 16px rgba(229,57,53,0.42); transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.95); }
  #controls-hint {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(255,220,130,0.88); border: 2px solid #c47b1a;
    border-radius: 20px; padding: 5px 14px; font-size: 12px; color: #5D1E00;
    pointer-events: none; z-index: 10; opacity: 0; transition: opacity 0.5s; white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div class="ui-box">
    <div class="score-label">Очки</div>
    <div class="score-value" id="scoreDisplay">0</div>
  </div>
  <div class="ui-box">
    <div class="score-label">Жизни</div>
    <div class="lives-display" id="livesDisplay">🌿🌿🌿</div>
  </div>
</div>
<div id="controls-hint">← → или тап по сторонам экрана</div>
<div id="overlay">
  <div class="overlay-card" id="overlayCard">
    <div class="overlay-title">🍕 Богиня Еды 🍕</div>
    <div class="overlay-sub">Богиня бросает еду сверху — лови хиппи!<br>Пропустишь 3 блюда — листочки кончатся.</div>
    <div class="food-legend">
      <span class="food-item"><span class="food-emoji">🍕</span> +10</span>
      <span class="food-item"><span class="food-emoji">🍪</span> +5</span>
      <span class="food-item"><span class="food-emoji">🍳</span> +8</span>
      <span class="food-item"><span class="food-emoji">🍱</span> +15</span>
      <span class="food-item"><span class="food-emoji">🧆</span> +12</span>
      <span class="food-item"><span class="food-emoji">🥤</span> +7</span>
    </div>
    <button class="btn" id="startBtn">Начать игру!</button>
  </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let scale;
const BASE_W = 390, BASE_H = 700;

function resize() {
  const sw = window.innerWidth, sh = window.innerHeight;
  scale = Math.min(sw / BASE_W, sh / BASE_H);
  canvas.width = BASE_W * scale; canvas.height = BASE_H * scale;
  canvas.style.width = canvas.width + 'px'; canvas.style.height = canvas.height + 'px';
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize(); window.addEventListener('resize', resize);

// STATE
let gameState = 'menu';
let score = 0, lives = 3;
let foods = [], particles = [];
let hippiX = BASE_W / 2, hippiVX = 0;
const HIPPI_W = 52, HIPPI_H = 60;
const HIPPI_SPEED = 7;
const FLOOR_Y = BASE_H - 58;
let frameCount = 0, nextFoodFrame = 90;
let goddessBob = 0, goddessLookDir = 0, goddessLookTimer = 60, armSwingVal = 0;
let catchFlash = null;

// INPUT
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup',   e => { keys[e.key] = false; });
let touchDir = 0;
canvas.addEventListener('touchstart', e => {
  touchDir = e.touches[0].clientX / scale < BASE_W / 2 ? -1 : 1;
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchend',    e => { touchDir = 0; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchcancel', e => { touchDir = 0; });

// FOOD TYPES
const FOOD_TYPES = [
  {id:'pizza',  points:10, color:'#F5C518', draw:drawPizza  },
  {id:'cookie', points:5,  color:'#C68B4E', draw:drawCookie },
  {id:'egg',    points:8,  color:'#FFF5A0', draw:drawEgg    },
  {id:'roll',   points:15, color:'#7CCD7C', draw:drawRoll   },
  {id:'falafel',points:12, color:'#D4A96A', draw:drawFalafel},
  {id:'drink',  points:7,  color:'#C62828', draw:drawDrink  },
];

// ====================== HELPERS ======================
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ====================== CLOUD ======================
function drawCloud(x, y, sc, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.translate(x,y); ctx.scale(sc,sc);
  // soft shadow puffs
  ctx.fillStyle = 'rgba(160,200,230,0.35)';
  [[0,6,36],[-32,14,26],[32,14,26],[0,20,22]].forEach(([px,py,r])=>{
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
  });
  // main white puffs
  ctx.fillStyle = '#FFFFFF';
  [[0,-2,36],[-36,10,26],[36,10,26],[-20,14,22],[20,14,22],[0,18,24],[-10,4,17],[10,4,17],[-28,4,14],[28,4,14]].forEach(([px,py,r])=>{
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
  });
  // top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath(); ctx.ellipse(-10,-12,15,9,-0.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ====================== GODDESS FOOD IN HANDS ======================
function drawPizzaSliceSmall(x,y) {
  ctx.fillStyle='#F5C518'; ctx.beginPath(); ctx.moveTo(x,y-36); ctx.lineTo(x-26,y+16); ctx.lineTo(x+26,y+16); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#D4A017'; ctx.beginPath(); ctx.moveTo(x-26,y+16); ctx.lineTo(x+26,y+16); ctx.lineTo(x+22,y+24); ctx.lineTo(x-22,y+24); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#C0392B'; [[0,-6],[9,4],[-9,3]].forEach(([px,py])=>{ ctx.beginPath(); ctx.arc(x+px,y+py,4,0,Math.PI*2); ctx.fill(); });
}
function drawDrinkSmall(x,y) {
  ctx.fillStyle='#C62828'; ctx.beginPath(); ctx.moveTo(x-13,y-18); ctx.lineTo(x-10,y+22); ctx.lineTo(x+10,y+22); ctx.lineTo(x+13,y-18); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#EAEAEA'; ctx.beginPath(); ctx.ellipse(x,y-18,13,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2ECC71'; ctx.fillRect(x-2,y-36,4,20); ctx.beginPath(); ctx.arc(x-2,y-36,4,Math.PI,0); ctx.fill();
}
function drawCupcakeSmall(x,y) {
  ctx.fillStyle='#C68B4E'; ctx.beginPath(); ctx.moveTo(x-15,y+6); ctx.lineTo(x-11,y+22); ctx.lineTo(x+11,y+22); ctx.lineTo(x+15,y+6); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#9B59B6';
  ctx.beginPath(); ctx.arc(x,y,15,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(x-8,y-7,9,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(x+8,y-7,9,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(x,y-15,9,Math.PI,0); ctx.fill();
  ctx.fillStyle='#C0392B'; ctx.beginPath(); ctx.arc(x,y-21,5,0,Math.PI*2); ctx.fill();
}

// ====================== GODDESS ======================
function drawGoddess(cx, cy) {
  const bob = goddessBob, look = goddessLookDir, sw = armSwingVal;
  ctx.save(); ctx.translate(cx, cy + bob);

  // --- ARMS (drawn first, behind body) ---
  function armPath(x1,y1,qx,qy,x2,y2) {
    ctx.strokeStyle='#4A9FD4'; ctx.lineWidth=16; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(qx,qy,x2,y2); ctx.stroke();
    ctx.fillStyle='#4A9FD4'; ctx.beginPath(); ctx.arc(x2,y2,9,0,Math.PI*2); ctx.fill();
  }
  function bracelet(bx,by) {
    ctx.fillStyle='#E8890C'; ctx.beginPath(); ctx.ellipse(bx,by,9,6,0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#F5C518'; ctx.beginPath(); ctx.ellipse(bx,by,6,4,0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#C0392B'; ctx.beginPath(); ctx.arc(bx-3,by,1.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#27AE60'; ctx.beginPath(); ctx.arc(bx+3,by,1.5,0,Math.PI*2); ctx.fill();
  }

  const us = sw * 9; // upper arm swing
  // Upper left — raised diagonally up-left
  armPath(-22,10, -52,-20+us, -66,-52+us);
  bracelet(-52,-12+us*0.55);
  // Upper right — raised diagonally up-right
  armPath(22,10,  52,-20-us,  66,-52-us);
  bracelet(52,-12-us*0.55);
  // Mid left — goes outward then slightly down
  armPath(-24,26, -58,28, -76,50);
  bracelet(-60,33);
  // Mid right
  armPath(24,26,  58,28,  76,50);
  bracelet(60,33);
  // Lower left — downward lotus
  armPath(-18,44, -34,70, -26,90);
  bracelet(-32,66);
  // Lower right
  armPath(18,44,  34,70,  26,90);
  bracelet(32,66);

  // --- TORSO ---
  ctx.fillStyle='#4A9FD4';
  ctx.beginPath();
  ctx.moveTo(-28,14); ctx.quadraticCurveTo(-38,52,-22,92); ctx.lineTo(22,92);
  ctx.quadraticCurveTo(38,52,28,14); ctx.closePath(); ctx.fill();

  // Chest cups (two darker rounded bumps like image)
  ctx.fillStyle='#3A7FAA';
  ctx.beginPath(); ctx.ellipse(-13,50,13,15,-0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(13,50,13,15,0.15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(80,150,190,0.3)';
  ctx.beginPath(); ctx.ellipse(-13,43,7,8,-0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(13,43,7,8,0.2,0,Math.PI*2); ctx.fill();

  // Gold collar
  ctx.fillStyle='#F0B429'; ctx.beginPath(); ctx.ellipse(0,20,17,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#F5C518'; ctx.beginPath(); ctx.ellipse(0,19,13,6,0,0,Math.PI*2); ctx.fill();

  // Pearl necklace
  for (let i=0; i<=9; i++) {
    const t=i/9;
    const nx=Math.cos(Math.PI+t*Math.PI)*22, ny=38+Math.sin(Math.PI+t*Math.PI)*10+t*(1-t)*8;
    ctx.fillStyle=i%2===0?'#FFFFFF':'#E0E0E0';
    ctx.beginPath(); ctx.arc(nx,ny,2.8,0,Math.PI*2); ctx.fill();
  }

  // --- HAIR (black, flowing both sides like image) ---
  ctx.fillStyle='#0F0F0F';
  // Left flowing panel
  ctx.beginPath();
  ctx.moveTo(-8,-40); ctx.quadraticCurveTo(-34,-22,-30,22);
  ctx.quadraticCurveTo(-32,52,-22,84); ctx.lineTo(-26,84);
  ctx.quadraticCurveTo(-36,52,-34,22); ctx.quadraticCurveTo(-38,-20,-10,-42);
  ctx.closePath(); ctx.fill();
  // Right flowing panel
  ctx.beginPath();
  ctx.moveTo(8,-40); ctx.quadraticCurveTo(34,-22,30,22);
  ctx.quadraticCurveTo(32,52,22,84); ctx.lineTo(26,84);
  ctx.quadraticCurveTo(36,52,34,22); ctx.quadraticCurveTo(38,-20,10,-42);
  ctx.closePath(); ctx.fill();
  // Top hair arc (behind crown)
  ctx.beginPath(); ctx.arc(look*2,-22,26,Math.PI*0.85,Math.PI*2.15); ctx.fill();

  // --- HEAD ---
  ctx.fillStyle='#4A9FD4'; ctx.beginPath(); ctx.ellipse(look*3,-22,23,26,0,0,Math.PI*2); ctx.fill();

  // --- CROWN (mukut) ---
  // Base orange band
  ctx.fillStyle='#E8890C'; ctx.beginPath(); ctx.ellipse(look*2,-44,26,10,0,0,Math.PI*2); ctx.fill();
  // Flame spikes (like image — pointed leaf shapes fanning out)
  const spikes=[
    {dx:-22,h:16,w:5,c:'#E8890C'},
    {dx:-14,h:24,w:6,c:'#F39C12'},
    {dx:-6, h:18,w:5,c:'#E74C3C'},
    {dx: 0, h:28,w:7,c:'#C0392B'},  // center taller
    {dx: 6, h:18,w:5,c:'#E74C3C'},
    {dx:14, h:24,w:6,c:'#F39C12'},
    {dx:22, h:16,w:5,c:'#E8890C'},
  ];
  spikes.forEach(s=>{
    ctx.fillStyle=s.c;
    ctx.beginPath();
    ctx.moveTo(look*2+s.dx-s.w,-46);
    ctx.quadraticCurveTo(look*2+s.dx,-46-s.h-5,look*2+s.dx+s.w,-46);
    ctx.closePath(); ctx.fill();
  });
  // Central red jewel (oval, like image)
  ctx.fillStyle='#C0392B'; ctx.beginPath(); ctx.ellipse(look*2,-52,9,15,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,160,140,0.55)'; ctx.beginPath(); ctx.ellipse(look*2-2,-57,4,6,-0.3,0,Math.PI*2); ctx.fill();
  // Gem row on crown band
  const gc=['#E74C3C','#8E44AD','#3498DB','#27AE60','#F39C12','#E74C3C','#8E44AD'];
  for(let i=0;i<7;i++){
    ctx.fillStyle=gc[i]; ctx.beginPath(); ctx.arc(look*2-18+i*6,-44,3,0,Math.PI*2); ctx.fill();
  }
  // Side color dots (pink/purple like image)
  ['#E91E8C','#9B59B6','#3498DB','#27AE60'].forEach((c,i)=>{
    ctx.fillStyle=c; ctx.beginPath(); ctx.arc(look*2-15+i*10,-48,3.5,0,Math.PI*2); ctx.fill();
  });

  // --- FACE ---
  const ex=look*5;
  // Eyebrows — flat, slightly stern
  ctx.strokeStyle='#0A0A0A'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(ex-13,-28); ctx.lineTo(ex-4,-26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ex+4,-26); ctx.lineTo(ex+13,-28); ctx.stroke();
  // Eyes — black dots (like image, simple)
  ctx.fillStyle='#0A0A0A';
  ctx.beginPath(); ctx.arc(ex-8,-21,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex+8,-21,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.65)';
  ctx.beginPath(); ctx.arc(ex-6,-23,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex+10,-23,1.5,0,Math.PI*2); ctx.fill();
  // Nose bump
  ctx.fillStyle='#3A88B5'; ctx.beginPath(); ctx.arc(ex,-14,3,0,Math.PI*2); ctx.fill();
  // Gold nose chain
  ctx.strokeStyle='#F5C518'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(ex+2,-13); ctx.quadraticCurveTo(ex+15,-9,ex+22,-20); ctx.stroke();
  ctx.fillStyle='#F5C518'; ctx.beginPath(); ctx.arc(ex+2,-13,2.5,0,Math.PI*2); ctx.fill();
  // Lips
  ctx.fillStyle='#C0392B'; ctx.beginPath(); ctx.ellipse(ex,-7,6,4,0,0,Math.PI); ctx.fill();
  ctx.fillStyle='#E74C3C'; ctx.beginPath(); ctx.ellipse(ex,-8,4,2.5,0,Math.PI,0); ctx.fill();

  // Earrings (gold + red drop like image)
  function earring(ex2,ey){
    ctx.fillStyle='#F5C518'; ctx.beginPath(); ctx.arc(ex2,ey,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#E74C3C'; ctx.beginPath(); ctx.arc(ex2,ey,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#F5C518'; ctx.beginPath(); ctx.moveTo(ex2-3,ey+4); ctx.lineTo(ex2+3,ey+4); ctx.lineTo(ex2,ey+14); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#E74C3C'; ctx.beginPath(); ctx.arc(ex2,ey+11,3.5,0,Math.PI*2); ctx.fill();
  }
  earring(look*2-25,-22); earring(look*2+25,-22);

  // Held foods
  ctx.save(); ctx.translate(-68+look*0.5,-62+us); ctx.scale(0.5,0.5); drawPizzaSliceSmall(0,0); ctx.restore();
  ctx.save(); ctx.translate(68+look*0.5,-62-us);  ctx.scale(0.46,0.46); drawDrinkSmall(0,0);    ctx.restore();
  ctx.save(); ctx.translate(-78,48);               ctx.scale(0.42,0.42); drawCupcakeSmall(0,0);  ctx.restore();
  ctx.save(); ctx.translate(78,48);                ctx.scale(0.46,0.46); drawPizzaSliceSmall(0,0); ctx.restore();

  ctx.restore();
}

// ====================== FOOD DRAW ======================
function _pizzaFull(x,y){
  ctx.fillStyle='#F5C518'; ctx.beginPath(); ctx.moveTo(x,y-42); ctx.lineTo(x-34,y+20); ctx.lineTo(x+34,y+20); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#D4A017'; ctx.beginPath(); ctx.moveTo(x-34,y+20); ctx.lineTo(x+34,y+20); ctx.lineTo(x+30,y+30); ctx.lineTo(x-30,y+30); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#F0D060'; ctx.beginPath(); ctx.ellipse(x,y-4,10,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#C0392B'; [[0,-10],[12,5],[-11,4]].forEach(([px,py])=>{ ctx.beginPath(); ctx.arc(x+px,y+py,5.5,0,Math.PI*2); ctx.fill(); });
}
function drawPizza(c,x,y,size){ c.save(); c.translate(x,y); c.scale(size/78,size/78); _pizzaFull(0,0); c.restore(); }

function drawCookie(c,x,y,size){
  c.save(); c.translate(x,y); c.scale(size/50,size/50);
  c.fillStyle='#C68B4E'; c.beginPath(); c.arc(0,0,24,0,Math.PI*2); c.fill();
  c.fillStyle='#A05C2C'; c.beginPath(); c.arc(0,0,21,0,Math.PI*2); c.fill();
  c.fillStyle='#5D3A1A'; [[-7,-5],[7,3],[-2,9],[9,-10],[-10,2]].forEach(([px,py])=>{ c.beginPath(); c.ellipse(px,py,4,3,0.5,0,Math.PI*2); c.fill(); });
  c.strokeStyle='#8B4513'; c.lineWidth=1.5; c.beginPath(); c.moveTo(-4,-11); c.lineTo(2,0); c.lineTo(-2,10); c.stroke();
  c.restore();
}
function drawEgg(c,x,y,size){
  c.save(); c.translate(x,y); c.scale(size/60,size/60);
  c.fillStyle='rgba(0,0,0,0.07)'; c.beginPath(); c.ellipse(2,8,32,10,0,0,Math.PI*2); c.fill();
  c.fillStyle='#FFFDE7'; c.beginPath(); c.ellipse(-4,4,22,14,-0.1,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(8,2,18,12,0.1,0,Math.PI*2); c.fill();
  c.fillStyle='#F9A825'; c.beginPath(); c.arc(1,3,12,0,Math.PI*2); c.fill();
  c.fillStyle='#FBC02D'; c.beginPath(); c.arc(1,3,8,0,Math.PI*2); c.fill();
  c.fillStyle='rgba(255,255,255,0.5)'; c.beginPath(); c.arc(-3,-1,4,0,Math.PI*2); c.fill();
  c.restore();
}
function drawRoll(c,x,y,size){
  c.save(); c.translate(x,y); c.scale(size/58,size/58);
  c.fillStyle='#1B5E20'; c.beginPath(); c.rect(-22,-14,44,28); c.fill();
  c.fillStyle='#FAFAFA'; c.beginPath(); c.arc(0,0,16,0,Math.PI*2); c.fill();
  c.fillStyle='#F4845F'; c.beginPath(); c.arc(0,0,11,0,Math.PI*2); c.fill();
  c.fillStyle='#FFFDE7'; c.beginPath(); c.arc(0,0,5,0,Math.PI*2); c.fill();
  c.fillStyle='#F5C518'; [[-6,0],[5,-4],[1,6]].forEach(([px,py])=>{ c.beginPath(); c.ellipse(px,py,2,1,0.5,0,Math.PI*2); c.fill(); });
  c.restore();
}
function drawFalafel(c,x,y,size){
  c.save(); c.translate(x,y); c.scale(size/54,size/54);
  c.fillStyle='#F5DEB3'; c.beginPath(); c.ellipse(0,0,26,20,0,0,Math.PI*2); c.fill();
  c.fillStyle='#4CAF50'; c.beginPath(); c.ellipse(-14,0,10,6,-0.3,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(14,0,10,6,0.3,0,Math.PI*2); c.fill();
  c.fillStyle='#8B5E3C'; [[-6,-2],[6,-2],[0,4]].forEach(([px,py])=>{ c.beginPath(); c.arc(px,py,7,0,Math.PI*2); c.fill(); });
  c.fillStyle='#A0522D'; [[-6,-2],[6,-2],[0,4]].forEach(([px,py])=>{ c.beginPath(); c.arc(px-1,py-1,4,0,Math.PI*2); c.fill(); });
  c.fillStyle='#F5C518'; [[-6,-2],[6,-2],[0,4]].forEach(([px,py])=>{ for(let i=0;i<4;i++){ const a=i/4*Math.PI*2; c.beginPath(); c.arc(px+Math.cos(a)*4,py+Math.sin(a)*4,1,0,Math.PI*2); c.fill(); } });
  c.restore();
}
function drawDrink(c,x,y,size){
  c.save(); c.translate(x,y); c.scale(size/62,size/62);
  c.fillStyle='#C62828'; c.beginPath(); c.moveTo(-18,-26); c.lineTo(-14,30); c.lineTo(14,30); c.lineTo(18,-26); c.closePath(); c.fill();
  c.fillStyle='rgba(255,255,255,0.17)'; c.beginPath(); c.moveTo(-14,-26); c.lineTo(-10,30); c.lineTo(-5,30); c.lineTo(-9,-26); c.closePath(); c.fill();
  c.fillStyle='#EFEFEF'; c.beginPath(); c.ellipse(0,-26,18,6,0,0,Math.PI*2); c.fill();
  c.fillStyle='#2ECC71'; c.fillRect(-3,-56,5,32); c.beginPath(); c.arc(-3,-56,5,Math.PI,0); c.fill();
  c.restore();
}

// ====================== HIPPY ======================
function drawHippy(x,y,moving){
  const ls=moving?Math.sin(frameCount*0.26)*14:0;
  const as=moving?Math.sin(frameCount*0.26+Math.PI)*10:0;
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.beginPath(); ctx.ellipse(0,4,24,7,0,0,Math.PI*2); ctx.fill();
  // legs
  ctx.strokeStyle='#3949AB'; ctx.lineWidth=10; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-7,-6); ctx.lineTo(-10+ls,22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,-6);  ctx.lineTo(10-ls,22); ctx.stroke();
  // sandals
  ctx.fillStyle='#5D4037';
  ctx.beginPath(); ctx.ellipse(-10+ls,25,11,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10-ls,25,11,6,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#8D6E63'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-16+ls,24); ctx.lineTo(-4+ls,24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4-ls,24); ctx.lineTo(16-ls,24); ctx.stroke();
  // jeans
  ctx.fillStyle='#1E88E5'; rr(-15,-10,30,24,6); ctx.fill();
  ctx.strokeStyle='#1565C0'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(0,14); ctx.stroke();
  // belt
  ctx.fillStyle='#795548'; ctx.fillRect(-15,-13,30,5);
  ctx.fillStyle='#F5C518'; rr(-5,-14,10,7,2); ctx.fill();
  // shirt
  ctx.fillStyle='#E91E63'; rr(-16,-36,32,28,9); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.38)'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(0,-22,6,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,-22,11,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.72)'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.arc(0,-22,7,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-15); ctx.lineTo(0,-29); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(-6,-27); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(6,-27); ctx.stroke();
  // arms
  ctx.strokeStyle='#FFCCAA'; ctx.lineWidth=9; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-15,-28); ctx.lineTo(-24-as,-14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(15,-28);  ctx.lineTo(24+as,-14); ctx.stroke();
  ctx.fillStyle='#FFCCAA';
  ctx.beginPath(); ctx.arc(-24-as,-14,5.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(24+as,-14,5.5,0,Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle='#FFCCAA'; ctx.beginPath(); ctx.ellipse(0,-52,17,19,0,0,Math.PI*2); ctx.fill();
  // afro
  ctx.fillStyle='#3E2000';
  ctx.beginPath(); ctx.arc(0,-56,22,Math.PI*0.9,Math.PI*2.1); ctx.fill();
  [-20,20].forEach(dx=>{ ctx.beginPath(); ctx.arc(dx,-52,11,0,Math.PI*2); ctx.fill(); });
  [-10,10].forEach(dx=>{ ctx.beginPath(); ctx.arc(dx,-70,12,0,Math.PI*2); ctx.fill(); });
  ctx.beginPath(); ctx.arc(0,-74,13,0,Math.PI*2); ctx.fill();
  // headband
  ctx.strokeStyle='#F5C518'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.arc(0,-54,19,Math.PI*1.05,Math.PI*1.95); ctx.stroke();
  ctx.fillStyle='#FF6F00'; for(let i=0;i<5;i++){ const a=i/5*Math.PI*2; ctx.beginPath(); ctx.arc(Math.cos(a)*4,-56+Math.sin(a)*4,3.5,0,Math.PI*2); ctx.fill(); }
  ctx.fillStyle='#FFF176'; ctx.beginPath(); ctx.arc(0,-56,3,0,Math.PI*2); ctx.fill();
  // sunglasses
  ctx.fillStyle='rgba(30,100,220,0.38)';
  ctx.beginPath(); ctx.ellipse(-7,-53,7,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7,-53,7,5,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#111'; ctx.lineWidth=2.2;
  ctx.beginPath(); ctx.ellipse(-7,-53,7,5,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(7,-53,7,5,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-14,-53); ctx.lineTo(-17,-50); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14,-53); ctx.lineTo(17,-50); ctx.stroke();
  ctx.strokeStyle='#5D1E00'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,-46,5,0.2,Math.PI-0.2); ctx.stroke();
  ctx.restore();
}

// ====================== PARTICLES ======================
function spawnParticles(x,y,color){
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*4.5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,life:1,color,r:4+Math.random()*5});
  }
}

// ====================== GAME LOGIC ======================
function spawnFood(){
  const type=FOOD_TYPES[Math.floor(Math.random()*FOOD_TYPES.length)];
  const x=44+Math.random()*(BASE_W-88);
  foods.push({x,y:202,vy:0.75+Math.random()*0.85,size:36+Math.random()*14,type,rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.055});
}

function updateGoddess(){
  goddessBob=Math.sin(frameCount*0.038)*7;
  armSwingVal=Math.sin(frameCount*0.052);
  goddessLookTimer--;
  if(goddessLookTimer<=0){
    const r=Math.random();
    goddessLookDir=r<0.33?-1:r<0.66?1:0;
    goddessLookTimer=70+Math.floor(Math.random()*110);
  }
}

function updateUI(){
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('livesDisplay').textContent='🌿'.repeat(lives)+'🍂'.repeat(Math.max(0,3-lives));
}

function showGameOver(){
  gameState='dead';
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`<div class="overlay-card">
    <div class="overlay-title">🍂 Игра окончена!</div>
    <div class="overlay-sub">Хиппи не успел поймать всю еду богини…</div>
    <div class="overlay-score">${score} очков</div>
    <button class="btn" id="restartBtn">Играть снова!</button>
  </div>`;
  document.getElementById('restartBtn').addEventListener('click', startGame);
}

function startGame(){
  score=0; lives=3; foods=[]; particles=[];
  hippiX=BASE_W/2; hippiVX=0;
  frameCount=0; nextFoodFrame=90; catchFlash=null;
  document.getElementById('overlay').style.display='none';
  gameState='playing';
  const hint=document.getElementById('controls-hint');
  hint.style.opacity='1';
  setTimeout(()=>{ hint.style.opacity='0'; },3000);
  updateUI();
}

// ====================== GAME LOOP ======================
function gameLoop(){
  ctx.clearRect(0,0,BASE_W,BASE_H);
  frameCount++;

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,BASE_H);
  sky.addColorStop(0,'#5BBEE8'); sky.addColorStop(0.4,'#A8D8F0');
  sky.addColorStop(0.68,'#C8EDCC'); sky.addColorStop(1,'#7DAE65');
  ctx.fillStyle=sky; ctx.fillRect(0,0,BASE_W,BASE_H);

  // BG clouds
  drawCloud(72+Math.sin(frameCount*0.007)*12, 76, 0.9, 0.52);
  drawCloud(308+Math.sin(frameCount*0.005+1.2)*10, 54, 0.78, 0.42);
  drawCloud(182, 38+Math.sin(frameCount*0.009)*6, 0.55, 0.32);

  // Ground
  const gg=ctx.createLinearGradient(0,FLOOR_Y-8,0,BASE_H);
  gg.addColorStop(0,'#6DB842'); gg.addColorStop(0.25,'#4E9429'); gg.addColorStop(1,'#2E6B14');
  ctx.fillStyle=gg;
  ctx.beginPath(); ctx.moveTo(0,FLOOR_Y);
  for(let gx=0;gx<=BASE_W;gx+=14) ctx.lineTo(gx,FLOOR_Y-4+Math.sin(gx*0.28+frameCount*0.01)*4);
  ctx.lineTo(BASE_W,BASE_H); ctx.lineTo(0,BASE_H); ctx.closePath(); ctx.fill();
  // grass blades
  ctx.strokeStyle='#5AAA35'; ctx.lineWidth=2; ctx.lineCap='round';
  for(let gx=8;gx<BASE_W;gx+=16){
    const bh=6+Math.sin(gx*0.5)*3, sway=Math.sin(frameCount*0.04+gx*0.3)*2;
    const gy=FLOOR_Y-2+Math.sin(gx*0.28)*3;
    ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(gx+sway,gy-bh); ctx.stroke();
  }

  updateGoddess();

  // Goddess cloud (under her)
  drawCloud(BASE_W/2, 176, 1.25, 0.97);
  // Goddess
  drawGoddess(BASE_W/2, 150);

  if(gameState==='playing'){
    if(frameCount>=nextFoodFrame){
      spawnFood();
      const sm=1+Math.min(score/260,1.8);
      nextFoodFrame=frameCount+Math.max(32,Math.floor(88/sm));
    }

    let moving=false;
    const dir=((keys['ArrowLeft']?-1:0)+(keys['ArrowRight']?1:0))||touchDir;
    if(dir!==0){ hippiVX=dir*HIPPI_SPEED; moving=true; }
    else{ hippiVX*=0.72; moving=Math.abs(hippiVX)>0.5; }
    hippiX=Math.max(28,Math.min(BASE_W-28,hippiX+hippiVX));

    for(let i=foods.length-1;i>=0;i--){
      const f=foods[i];
      f.y+=f.vy; f.vy+=0.026; f.rotation+=f.rotSpeed;

      const catchY=FLOOR_Y-HIPPI_H+14;
      if(f.y>catchY-14&&f.y<catchY+26&&Math.abs(f.x-hippiX)<HIPPI_W/2+f.size/2.2){
        score+=f.type.points;
        spawnParticles(f.x,f.y,f.type.color);
        catchFlash={x:f.x,y:f.y-16,text:'+'+f.type.points,color:f.type.color,t:44};
        foods.splice(i,1); updateUI(); continue;
      }
      if(f.y>FLOOR_Y+18){
        lives=Math.max(0,lives-1);
        spawnParticles(f.x,FLOOR_Y,'#E74C3C');
        foods.splice(i,1); updateUI();
        if(lives<=0){ showGameOver(); break; }
        continue;
      }
      ctx.save(); ctx.translate(f.x,f.y); ctx.rotate(f.rotation);
      f.type.draw(ctx,0,0,f.size);
      ctx.restore();
    }

    drawHippy(hippiX,FLOOR_Y-HIPPI_H+30,moving);
  } else {
    drawHippy(hippiX,FLOOR_Y-HIPPI_H+30,false);
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=0.038;
    if(p.life<=0){ particles.splice(i,1); continue; }
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // Catch flash
  if(catchFlash){
    const al=catchFlash.t/44;
    ctx.globalAlpha=al; ctx.fillStyle=catchFlash.color;
    ctx.font='bold 20px Georgia'; ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=4;
    ctx.fillText(catchFlash.text,catchFlash.x,catchFlash.y-(44-catchFlash.t)*0.55);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    if(--catchFlash.t<=0) catchFlash=null;
  }

  requestAnimationFrame(gameLoop);
}

document.getElementById('startBtn').addEventListener('click', startGame);
gameLoop();
</script>
</body>
